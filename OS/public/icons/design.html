<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exported Design</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f3f4f6; width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        .element { position: absolute; display: flex; align-items: center; justify-content: center; box-sizing: border-box; overflow: hidden; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="element" style=" left: 33px; top: 68px; width: 150px; height: 150px; background-color: #e2e8f0; transform: rotate(0deg); "></div>
    <div class="element" style=" left: 150px; top: 150px; width: 200px; height: 50px; background-color: transparent; transform: rotate(0deg); font-size: 16px; padding: 8px; justify-content: flex-start; align-items: flex-start; ">Hello World</div>
    <div class="element" style=" left: 212px; top: 250px; width: 150px; height: 150px; background-color: #e2e8f0; transform: rotate(0deg); "></div>
    <div class="element" style=" left: 325px; top: 113px; width: 150px; height: 150px; background-color: #e2e8f0; transform: rotate(0deg); "></div>
    <div class="element" style=" left: 113px; top: 428px; width: 150px; height: 150px; background-color: #325686; transform: rotate(0deg); "></div>
    <div class="element" style=" left: 425px; top: 470px; width: 200px; height: 50px; background-color: transparent; transform: rotate(0deg); font-size: 16px; padding: 8px; justify-content: flex-start; align-items: flex-start; ">Hello World</div>
</body>
</html>
